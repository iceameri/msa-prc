# 모든 서비스 공통 설정
logging:
  logstash:
    host: logstash
    port: 5000

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, refresh
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

eureka:
  instance:
    prefer-ip-address: true
    initial-status: STARTING
