spring:
  datasource:
    url: jdbc:postgresql://postgres-auth:5432/authorization_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: redis-master  # Bitnami Redis Helm chart의 master 서비스명
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092

  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

  security:
    oauth2:
      authorizationserver:
        issuer: ${AUTH_ISSUER_URI}

  sql:
    init:
      mode: always
      schema-locations:
        - classpath:sql/ddl/tenants.sql
        - classpath:sql/ddl/users.sql
        - classpath:sql/ddl/user_authorities.sql
        - classpath:sql/ddl/user_activity.sql
        - classpath:sql/ddl/system_clients.sql
        - classpath:sql/ddl/oauth2_registered_client.sql
        - classpath:sql/ddl/oauth2_authorization.sql
        - classpath:sql/ddl/oauth2_authorization_consent.sql
        - classpath:sql/ddl/api_keys.sql
        - classpath:sql/migration/add_tenant_to_users.sql

# RSA 키페어 마운트 경로 (k8s Secret → /app/keys 볼륨)
rsa:
  key-path: /app/keys

resilience4j:
  circuitbreaker:
    instances:
      authorization-db:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2

management:
  otlp:
    tracing:
      endpoint: http://alloy.msa.svc.cluster.local:4318/v1/traces
  tracing:
    sampling:
      probability: 1.0  # Alloy tail-sampling에 위임, 앱은 전량 전송

logging:
  level:
    root: INFO
    com.example: INFO
