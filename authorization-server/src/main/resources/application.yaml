server:
  port: 1010

spring:
  application:
    name: authorization-server

  config:
    import: "optional:configserver:http://localhost:1110"

  # ── Database ────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/authorization_db   # postgres-auth
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  # ── Redis ───────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379

  # ── Kafka ───────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: authorization-server-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

  # ── Mail (비밀번호 재설정) ────────────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username:   # Gmail 주소
    password:   # Gmail 앱 비밀번호
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  # ── OAuth2 ──────────────────────────────────────────────
  security:
    oauth2:
      authorizationserver:
        issuer: http://localhost:1010
#      client:
#        registration:
#          google:
#            client-id:       # Google Cloud Console에서 발급
#            client-secret:   # Google Cloud Console에서 발급
#            scope: openid, profile, email
#          github:
#            client-id:       # GitHub Developer Settings에서 발급
#            client-secret:   # GitHub Developer Settings에서 발급
#            scope: read:user, user:email

# ── Eureka ────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:1120/eureka/
    healthcheck:
      enabled: true
    registry-fetch-interval-seconds: 5        # 기본 30초 → 레지스트리 갱신 주기
  instance:
    prefer-ip-address: true
    initial-status: STARTING                  # 헬스체크 통과 전까지 트래픽 차단
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10     # 기본 30초 → 하트비트 주기
    lease-expiration-duration-in-seconds: 30  # 기본 90초 → 이 시간 동안 하트비트 없으면 DOWN
    health-check-url-path: /actuator/health
    status-page-url-path: /actuator/info

# ── Actuator & Monitoring ─────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, refresh
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0

# ── Resilience4j ──────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      default:
        max-attempts: 3
        wait-duration: 500ms
  timelimiter:
    instances:
      default:
        timeout-duration: 3s
