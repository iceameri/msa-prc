spring:
  datasource:
    url: jdbc:postgresql://postgres-opaque:5432/opaque_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: redis-master  # Bitnami Redis Helm chart의 master 서비스명
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092

  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

  security:
    oauth2:
      resourceserver:
        opaquetoken:
          introspection-uri: ${AUTH_ISSUER_URI}/oauth2/introspect
          client-id: opaque-server-client
          client-secret: ${OPAQUE_CLIENT_SECRET}
        jwt:
          issuer-uri: ${AUTH_ISSUER_URI}

  sql:
    init:
      mode: always
      schema-locations:
        - classpath:sql/ddl/payments.sql
        - classpath:sql/ddl/payment_sagas.sql
        - classpath:sql/ddl/reports.sql
        - classpath:sql/ddl/audit_logs.sql
        - classpath:sql/ddl/notifications.sql
        - classpath:sql/ddl/outbox_events.sql

management:
  otlp:
    tracing:
      endpoint: http://tempo:4318/v1/traces

logging:
  level:
    root: INFO
    com.example: INFO
