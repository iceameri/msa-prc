server:
  port: 1030

spring:
  application:
    name: opaque-server

  # ── Database ────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5434/opaque_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  # ── Redis ───────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379

  # ── Kafka ───────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: opaque-server-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest

  # ── Mail (이메일 알림) ────────────────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username:   # Gmail 주소
    password:   # Gmail 앱 비밀번호
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  # ── OAuth2 Resource Server (Opaque Token 검증) ──────────
  security:
    oauth2:
      resourceserver:
        opaquetoken:
          introspection-uri: http://localhost:1010/oauth2/introspect
          client-id: opaque-server-client
          client-secret: 1234qwer
        jwt:
          issuer-uri: http://localhost:1010

# ── Actuator & Monitoring ─────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  health:
    mail:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  tracing:
    sampling:
      probability: 1.0  # Alloy tail-sampling에 위임, 앱은 전량 전송

# ── Logging ───────────────────────────────────────────────
logging:
  level:
    root: DEBUG
    com.example: DEBUG

# ── Resilience4j ──────────────────────────────────────────
outbox:
  relay:
    fixed-delay: 5000

resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      default:
        max-attempts: 3
        wait-duration: 500ms
  timelimiter:
    instances:
      default:
        timeout-duration: 3s
