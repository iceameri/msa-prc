server:
  port: 1100

spring:
  application:
    name: gateway-server

  config:
    import: "optional:configserver:http://localhost:1110"

  # ── Redis (Rate Limiting) ────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379

  # ── OAuth2 Resource Server (JWT 사전 검증) ───────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:1010
          jwk-set-uri: http://localhost:1010/oauth2/jwks

  # ── Spring Cloud Gateway ─────────────────────────────────
  cloud:
    gateway:
      server:
        webflux:
          # CORS 설정
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins: "*"
                allowed-methods: "*"
                allowed-headers: "*"
          # 공통 필터
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
          # 라우팅
          routes:
            - id: authorization-server
              uri: lb://authorization-server
              predicates:
                - Path=/auth/**

            - id: jwt-server
              uri: lb://jwt-server
              predicates:
                - Path=/api/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    redis-rate-limiter.requestedTokens: 1

            - id: opaque-server-admin
              uri: lb://opaque-server
              predicates:
                - Path=/admin/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1

            - id: opaque-server-user
              uri: lb://opaque-server
              predicates:
                - Path=/payments/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    redis-rate-limiter.requestedTokens: 1

# ── Eureka ────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:1120/eureka/
    healthcheck:
      enabled: true
    registry-fetch-interval-seconds: 5        # 기본 30초 → 레지스트리 갱신 주기
  instance:
    prefer-ip-address: true
    initial-status: STARTING                  # 헬스체크 통과 전까지 트래픽 차단
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10     # 기본 30초 → 하트비트 주기
    lease-expiration-duration-in-seconds: 30  # 기본 90초 → 이 시간 동안 하트비트 없으면 DOWN
    health-check-url-path: /actuator/health
    status-page-url-path: /actuator/info

# ── Actuator & Monitoring ─────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, refresh
  metrics:
    tags:
      application: ${spring.application.name}
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0

# ── Springdoc ─────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html

# ── Resilience4j Reactive ─────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      default:
        timeout-duration: 5s
