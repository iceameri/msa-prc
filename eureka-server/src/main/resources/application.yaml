server:
  port: 1120

spring:
  application:
    name: eureka-server

  # ── Security (대시보드 보안) ──────────────────────────────
  security:
    user:
      name: admin
      password: admin

# ── Eureka Server ─────────────────────────────────────────
eureka:
  instance:
    hostname: localhost
    initial-status: STARTING   # 헬스체크 통과 전까지 트래픽 차단
  client:
    register-with-eureka: false   # 자기 자신은 등록하지 않음
    fetch-registry: false         # 자기 자신은 조회하지 않음
    service-url:
      defaultZone: http://localhost:1120/eureka/
  server:
    enable-self-preservation: false   # 개발 환경에서 비활성화
    eviction-interval-timer-in-ms: 5000       # 기본 60000ms → 만료 인스턴스 제거 주기
    response-cache-update-interval-ms: 3000   # 기본 30000ms → 레지스트리 캐시 갱신 주기

# ── Actuator ──────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info
  metrics:
    tags:
      application: ${spring.application.name}
