# ⚠️  실제 값으로 채운 후 적용하세요. Git에 커밋하지 마세요.
# 적용: kubectl apply -f k8s/secrets/app-secrets.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: authorization-server-secret
  namespace: msa
type: Opaque
stringData:
  DB_USERNAME: "admin"
  DB_PASSWORD: "CHANGE_ME"
  MAIL_USERNAME: "your@gmail.com"
  MAIL_PASSWORD: "CHANGE_ME"
  AUTH_ISSUER_URI: "https://auth.example.com"  # 실제 도메인으로 변경
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-server-secret
  namespace: msa
type: Opaque
stringData:
  DB_USERNAME: "admin"
  DB_PASSWORD: "CHANGE_ME"
  AUTH_ISSUER_URI: "https://auth.example.com"
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  AWS_REGION: "ap-northeast-2"
---
apiVersion: v1
kind: Secret
metadata:
  name: opaque-server-secret
  namespace: msa
type: Opaque
stringData:
  DB_USERNAME: "admin"
  DB_PASSWORD: "CHANGE_ME"
  MAIL_USERNAME: "your@gmail.com"
  MAIL_PASSWORD: "CHANGE_ME"
  AUTH_ISSUER_URI: "https://auth.example.com"
  OPAQUE_CLIENT_SECRET: "1234qwer"  # 운영 환경에서 반드시 변경
