# RSA 키페어 생성 후 적용:
#
#   # PKCS8 형식 private key + X.509 형식 public key 생성
#   openssl genrsa -out rsa_private.pem 2048
#   openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt -in rsa_private.pem -out private.pem
#   openssl rsa -in rsa_private.pem -pubout -out public.pem
#
#   # Secret 생성 (파일에서 직접)
#   kubectl create secret generic rsa-keypair \
#     --from-file=private.pem=./private.pem \
#     --from-file=public.pem=./public.pem \
#     -n msa
#
# ⚠️  private.pem, public.pem 파일은 Git에 커밋하지 마세요.
---
apiVersion: v1
kind: Secret
metadata:
  name: rsa-keypair
  namespace: msa
type: Opaque
data:
  private.pem: ""  # base64(pkcs8 PEM) — kubectl create secret 명령으로 생성 권장
  public.pem: ""   # base64(X.509 PEM)
