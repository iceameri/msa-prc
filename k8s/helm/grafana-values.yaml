grafana.ini:
  auth.anonymous:
    enabled: true
    org_role: Viewer

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Mimir
        type: prometheus
        uid: mimir
        url: http://mimir-nginx.msa.svc.cluster.local/prometheus
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: "15s"

      - name: Loki
        type: loki
        uid: loki
        url: http://loki.msa.svc.cluster.local:3100
        access: proxy
        jsonData:
          derivedFields:
            - name: TraceID
              matcherRegex: "traceId=(\\w+)"
              url: "${__value.raw}"
              datasourceUid: tempo

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.msa.svc.cluster.local:3200
        access: proxy
        jsonData:
          serviceMap:
            datasourceUid: mimir
          search:
            hide: false
          nodeGraph:
            enabled: true
          lokiSearch:
            datasourceUid: loki

persistence:
  enabled: true
  size: 5Gi

service:
  type: ClusterIP
