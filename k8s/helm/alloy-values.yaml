alloy:
  configMap:
    content: |
      // ── Metrics: Spring Boot Actuator → Mimir ───────────────────────────

      prometheus.scrape "spring_services" {
        targets = [
          {"__address__" = "authorization-server.msa.svc.cluster.local", "__metrics_path__" = "/actuator/prometheus"},
          {"__address__" = "jwt-server.msa.svc.cluster.local", "__metrics_path__" = "/actuator/prometheus"},
          {"__address__" = "opaque-server.msa.svc.cluster.local", "__metrics_path__" = "/actuator/prometheus"},
        ]
        scrape_interval = "15s"
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir-nginx.msa.svc.cluster.local/api/v1/push"
        }
      }

      // ── Traces: Spring Boot → Alloy (tail-sampling) → Tempo ─────────────

      otelcol.receiver.otlp "traces" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }
        output {
          traces = [otelcol.processor.tail_sampling.default.input]
        }
      }

      otelcol.processor.tail_sampling "default" {
        decision_wait = "10s"
        num_traces    = 50000

        policy {
          name = "errors"
          type = "and"
          and {
            and_sub_policy {
              name = "is-error"
              type = "status_code"
              status_code {
                status_codes = ["ERROR"]
              }
            }
            and_sub_policy {
              name = "sample-rate"
              type = "probabilistic"
              probabilistic {
                sampling_percentage = 100
              }
            }
          }
        }

        policy {
          name = "normal"
          type = "probabilistic"
          probabilistic {
            sampling_percentage = 100
          }
        }

        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.msa.svc.cluster.local:4317"
          tls {
            insecure = true
          }
        }
      }

      // ── Logs: 인프라 Pod (Kafka, Redis, PostgreSQL 등) → Loki ───────────
      // Spring Boot 3서비스는 Loki4j가 직접 push하므로 제외

      discovery.kubernetes "infra_pods" {
        role = "pod"
        namespaces {
          names = ["msa"]
        }
      }

      discovery.relabel "infra_logs" {
        targets = discovery.kubernetes.infra_pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          regex = "kafka|redis|postgres.*|elasticsearch"
          action = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label = "app"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label = "namespace"
        }
      }

      loki.source.kubernetes "infra_pod_logs" {
        targets    = discovery.relabel.infra_logs.output
        forward_to = [loki.write.loki.receiver]
      }

      loki.write "loki" {
        endpoint {
          url = "http://loki.msa.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

service:
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

serviceAccount:
  create: true

rbac:
  create: true
