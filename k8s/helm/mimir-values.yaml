mimir:
  structuredConfig:
    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /data/mimir
    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir/blocks
    compactor:
      data_dir: /data/mimir/compactor
    ingester:
      ring:
        replication_factor: 1
    store_gateway:
      sharding_ring:
        replication_factor: 1

# MinIO, Nginx 불필요 (단일 노드 + 직접 접근)
minio:
  enabled: false

nginx:
  enabled: false

alertmanager:
  enabled: false

ruler:
  enabled: false
