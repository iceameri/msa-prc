apiVersion: apps/v1
kind: Deployment
metadata:
  name: opaque-server
  namespace: msa
  annotations:
    secret.reloader.stakater.com/reload: "opaque-server-secret"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: opaque-server
  template:
    metadata:
      labels:
        app: opaque-server
    spec:
      containers:
        - name: opaque-server
          image: iceameri/opaque-server:0.0.1-SNAPSHOT  # 빌드 후 실제 이미지로 교체
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 1030
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
          envFrom:
            - secretRef:
                name: opaque-server-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 1030
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 1030
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: opaque-server
  namespace: msa
spec:
  selector:
    app: opaque-server
  ports:
    - name: http
      port: 80
      targetPort: 1030
  type: ClusterIP
