server:
  port: 1020

spring:
  application:
    name: jwt-server

  config:
    import: "optional:configserver:http://localhost:1110"

  # ── Database ────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5433/jwt_db   # postgres-jwt
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  # ── Redis ───────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379

  # ── Kafka ───────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: jwt-server-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

  # ── Elasticsearch ───────────────────────────────────────
  elasticsearch:
    uris: http://localhost:9200

  # ── OAuth2 Resource Server (JWT 검증) ───────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:1010
          jwk-set-uri: http://localhost:1010/oauth2/jwks

# ── MinIO ──────────────────────────────────────────────────
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: jwt-server

# ── Eureka ────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:1120/eureka/
    healthcheck:
      enabled: true
    registry-fetch-interval-seconds: 5        # 기본 30초 → 레지스트리 갱신 주기
  instance:
    prefer-ip-address: true
    initial-status: STARTING                  # 헬스체크 통과 전까지 트래픽 차단
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10     # 기본 30초 → 하트비트 주기
    lease-expiration-duration-in-seconds: 30  # 기본 90초 → 이 시간 동안 하트비트 없으면 DOWN
    health-check-url-path: /actuator/health
    status-page-url-path: /actuator/info

# ── Actuator & Monitoring ─────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, refresh
  health:
    elasticsearch:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0

# ── Resilience4j ──────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      default:
        max-attempts: 3
        wait-duration: 500ms
  timelimiter:
    instances:
      default:
        timeout-duration: 3s
