server:
  port: 1020

spring:
  application:
    name: jwt-server

  # ── Database ────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5433/jwt_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  # ── Redis ───────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379

  # ── Kafka ───────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: jwt-server-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

  # ── Elasticsearch ───────────────────────────────────────
  elasticsearch:
    uris: http://localhost:9200

  # ── OAuth2 Resource Server (JWT 검증) ───────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:1010
          jwk-set-uri: http://localhost:1010/oauth2/jwks

# ── MinIO ──────────────────────────────────────────────────
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: jwt-server

# ── Actuator & Monitoring ─────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  health:
    elasticsearch:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0
    propagation:
      consume: [b3_multi, b3]
      produce: [b3_multi, b3]

# ── Logging ───────────────────────────────────────────────
logging:
  logstash:
    host: localhost
    port: 5000
  level:
    root: DEBUG
    com.example: DEBUG

# ── Resilience4j ──────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      default:
        max-attempts: 3
        wait-duration: 500ms
  timelimiter:
    instances:
      default:
        timeout-duration: 3s
