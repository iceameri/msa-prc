spring:
  datasource:
    url: jdbc:postgresql://postgres-jwt:5432/jwt_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092

  elasticsearch:
    uris: http://elasticsearch:9200

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_ISSUER_URI}
          jwk-set-uri: ${AUTH_ISSUER_URI}/oauth2/jwks

minio:
  endpoint: http://minio:9000
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}

management:
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  logstash:
    host: logstash
    port: 5000
  level:
    root: INFO
    com.example: INFO
